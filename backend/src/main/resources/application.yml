spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: CloudFileOrganizer
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

server:
  port: ${SERVER_PORT:8080}

aws:
  access-key-id: ${AWS_ACCESS_KEY_ID}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY}
  region: ${AWS_REGION:us-east-1}
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME}
    url-expiration-minutes: 60

gemini:
  api-key: ${GEMINI_API_KEY}
  url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
  retry:
    max-attempts: 3
    backoff-period: 2000

ai:
  analysis:
    enabled: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.cloudfileorganizer: DEBUG

app:
  base-url: ${APP_BASE_URL}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://smart-cloud-iota.vercel.app}

transfer:
  default-expiry-minutes: ${TRANSFER_DEFAULT_EXPIRY_MINUTES:10}
  default-max-downloads: ${TRANSFER_DEFAULT_MAX_DOWNLOADS:1}
  max-file-size-bytes: ${TRANSFER_MAX_FILE_SIZE_BYTES:52428800}
  pin-length: ${TRANSFER_PIN_LENGTH:6}
  max-pin-attempts: ${TRANSFER_MAX_PIN_ATTEMPTS:5}
  pin-rate-window-minutes: ${TRANSFER_PIN_RATE_WINDOW_MINUTES:15}
  pin-rate-max-attempts: ${TRANSFER_PIN_RATE_MAX_ATTEMPTS:5}
  lock-minutes: ${TRANSFER_LOCK_MINUTES:15}
  verification-ttl-seconds: ${TRANSFER_VERIFICATION_TTL_SECONDS:180}
  download-url-seconds: ${TRANSFER_DOWNLOAD_URL_SECONDS:60}
  upload-url-seconds: ${TRANSFER_UPLOAD_URL_SECONDS:3600}
  pin-encryption-key: ${TRANSFER_PIN_ENCRYPTION_KEY:}
  cleanup-interval-ms: ${TRANSFER_CLEANUP_INTERVAL_MS:300000}
